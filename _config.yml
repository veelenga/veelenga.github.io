title: "Vitalii Elenhaupt"
name: "Vitalii Elenhaupt"
description: "Software engineer. Building scalable systems and efficient infrastructure."
url: "https://veelenga.github.io"
locale: "en-US"

author:
  name: "Vitalii Elenhaupt"
  email: velenhaupt@gmail.com
  twitter: veelenga
  github: veelenga
  medium: veelenga
  stackoverflow: "1586762/vitalii-elenhaupt"

# SEO
google_site_verification: ImaDf_2ZgCxHbiLwVWkoyw4Q4l9ZBSsozPll6JY24vk

# Analytics
google_analytics: "G-K8Z4KZZHG8"

# Build
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge
excerpt_separator: "\n\n"

# URLs — must match the old site
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Files
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page
